<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAKC ULTRA | Single Channel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ONYX DESIGN SYSTEM */
        :root {
            --bg-deep: #000000;
            --accent: #00f2ff; /* Cyber Cyan */
            --accent-dim: rgba(0, 242, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #71717a;
            --error: #ff453a;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- PROFESSIONAL PLAYER LAYER --- */
        .player-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* PLAYER UI OVERLAY (OSD) */
        .osd-layer {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.85) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .player-container:hover .osd-layer, 
        .osd-layer.force-show {
            opacity: 1;
        }

        .osd-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .osd-channel-meta {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .osd-channel-meta h1 {
            font-size: 28px;
            font-weight: 900;
            font-family: 'Montserrat', 'Cairo', sans-serif;
            letter-spacing: 1px;
        }

        .osd-bottom {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .osd-controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .osd-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .osd-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-dim);
        }

        .osd-btn.brand-icon {
            background: var(--accent);
            color: #000;
            cursor: default;
        }
        
        .osd-btn.brand-icon:hover {
            transform: none;
            box-shadow: none;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 0 20px;
            height: 54px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .volume-container:hover {
            border-color: rgba(255,255,255,0.2);
        }

        input[type="range"] {
            width: 100px;
            accent-color: var(--accent);
            cursor: pointer;
            height: 4px;
        }

        .stream-info-badge {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--error);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.7); }
            70% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 0 10px rgba(255, 69, 58, 0); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 69, 58, 0); }
        }

        /* --- LOADING STATES --- */
        .player-loader {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 5;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- TOAST NOTIFICATIONS --- */
        #toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 17, 18, 0.9);
            border: 1px solid var(--accent);
            padding: 12px 30px;
            border-radius: 50px;
            z-index: 3000;
            font-weight: 700;
            backdrop-filter: blur(10px);
            display: none;
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 40px; opacity: 1; } }

        /* Hide cursor when inactive */
        .hide-cursor {
            cursor: none;
        }

    </style>
</head>
<body>

    <div class="player-container" id="videoWrapper">
        
        <div class="player-loader" id="playerLoader">
            <div class="spinner"></div>
            <p style="font-weight: 700; letter-spacing: 1px; color: var(--text-dim);">جاري الاتصال بالبث المباشر...</p>
        </div>

        <video id="videoPlayer" playsinline></video>

        <div class="osd-layer force-show" id="osdLayer">
            <div class="osd-top">
                <div class="osd-channel-meta">
                    <div class="osd-btn brand-icon"><i class="fa-solid fa-bolt"></i></div>
                    <div>
                        <h1 id="osdTitle">الحدث الأخبارية</h1>
                        <p id="osdSub" style="color:var(--text-dim); font-weight:700;">LIVE STREAMING</p>
                    </div>
                </div>
            </div>

            <div class="osd-bottom">
                <div class="osd-controls-row">
                    <div class="control-group">
                        <button class="osd-btn" onclick="togglePlay()" id="playBtn"><i class="fa-solid fa-pause"></i></button>
                        <button class="osd-btn" onclick="reconnectStream()" title="تحديث البث"><i class="fa-solid fa-rotate"></i></button>
                        
                        <div class="volume-container">
                            <i class="fa-solid fa-volume-high" style="font-size: 14px; color: var(--text-dim);" id="volIcon"></i>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="stream-info-badge">
                            <div class="live-dot"></div>
                            <span id="qualityBadge">AUTO</span>
                        </div>
                        <button class="osd-btn" onclick="toggleFullscreen()"><i class="fa-solid fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">تم الإجراء</div>

    <script>
        // --- CONFIGURATION ---
        const CHANNEL_CONFIG = {
            name: "الحدث الأخبارية",
            url: "https://shd-gcp-live.edgenextcdn.net/live/bitmovin-hadath/2ff87ec4c2f3ede35295a20637d9f8fd/index.m3u8"
        };

        // --- APP STATE ---
        let hls = null;
        let timeout;

        // --- INITIALIZATION ---
        window.onload = () => {
            initPlayer();
            setupInactivityTimer();
        };

        function initPlayer() {
            const video = document.getElementById('videoPlayer');
            const loader = document.getElementById('playerLoader');
            
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({
                    capLevelToPlayerSize: true,
                    debug: false,
                    manifestLoadingMaxRetry: 5,
                    manifestLoadingRetryDelay: 2000
                });

                hls.loadSource(CHANNEL_CONFIG.url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    // محاولة التشغيل التلقائي
                    video.play().then(() => {
                        loader.style.display = 'none';
                        showToast("متصل بالبث المباشر");
                        document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-pause"></i>';
                        setTimeout(() => { document.getElementById('osdLayer').classList.remove('force-show'); }, 3000);
                    }).catch(e => {
                        // في حال منع المتصفح التشغيل التلقائي بسبب الصوت
                        loader.style.display = 'none';
                        document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-play"></i>';
                        showToast("انقر للتشغيل");
                    });
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                showToast("خطأ في الشبكة، محاولة إعادة الاتصال...");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                showToast("البث غير متوفر حالياً");
                                break;
                        }
                    }
                });

                hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
                    const level = hls.levels[data.level];
                    document.getElementById('qualityBadge').innerText = level.height + 'P';
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // For Safari / iOS
                video.src = CHANNEL_CONFIG.url;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => showToast("انقر للتشغيل"));
                    loader.style.display = 'none';
                });
            }
        }

        // --- CONTROLS LOGIC ---
        function reconnectStream() {
            showToast("جاري تحديث البث...");
            document.getElementById('playerLoader').style.display = 'flex';
            initPlayer();
        }

        function togglePlay() {
            const video = document.getElementById('videoPlayer');
            const btn = document.getElementById('playBtn');
            if (video.paused) {
                video.play();
                btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                video.pause();
                btn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        }

        function setVolume(val) {
            const video = document.getElementById('videoPlayer');
            const icon = document.getElementById('volIcon');
            video.volume = val;
            
            if(val == 0) {
                icon.className = "fa-solid fa-volume-xmark";
                icon.style.color = "var(--error)";
            } else if(val < 0.5) {
                icon.className = "fa-solid fa-volume-low";
                icon.style.color = "var(--text-dim)";
            } else {
                icon.className = "fa-solid fa-volume-high";
                icon.style.color = "var(--text-dim)";
            }
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('videoWrapper');
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(err => {
                    showToast(`خطأ: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // --- INACTIVITY TIMER (Auto Hide UI & Cursor) ---
        function setupInactivityTimer() {
            const wrapper = document.getElementById('videoWrapper');
            const osd = document.getElementById('osdLayer');

            wrapper.addEventListener('mousemove', resetTimer);
            wrapper.addEventListener('mousedown', resetTimer);
            wrapper.addEventListener('touchstart', resetTimer);
            wrapper.addEventListener('keydown', resetTimer);

            function resetTimer() {
                clearTimeout(timeout);
                wrapper.classList.remove('hide-cursor');
                osd.style.opacity = '1';
                
                timeout = setTimeout(() => {
                    if(!document.getElementById('videoPlayer').paused) {
                        wrapper.classList.add('hide-cursor');
                        osd.style.opacity = '0';
                    }
                }, 4000);
            }
        }

        // --- UTILS ---
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if(e.key === ' ') {
                e.preventDefault();
                togglePlay();
            }
            if(e.key === 'f' || e.key === 'F') toggleFullscreen();
            if(e.key === 'r' || e.key === 'R') reconnectStream();
            if(e.key === 'ArrowUp') {
                let vol = document.getElementById('videoPlayer').volume;
                document.getElementById('volumeSlider').value = Math.min(vol + 0.1, 1);
                setVolume(Math.min(vol + 0.1, 1));
            }
            if(e.key === 'ArrowDown') {
                let vol = document.getElementById('videoPlayer').volume;
                document.getElementById('volumeSlider').value = Math.max(vol - 0.1, 0);
                setVolume(Math.max(vol - 0.1, 0));
            }
        });

    </script>
</body>
</html>
